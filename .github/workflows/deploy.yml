name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-yonyou-red
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack source (exclude node_modules / .git / dist)
        run: |
          staging="/tmp/yonyou-red-src"
          rm -rf "$staging"
          mkdir -p "$staging"
          rsync -a \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            --exclude .env \
            --exclude deploy.tar.gz \
            ./ "$staging/"
          tar -czf deploy.tar.gz -C "$staging" .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy.tar.gz
          target: /tmp

      - name: Extract, build and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH || '/var/www/Yonyou_Red' }}"
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/deploy.tar.gz
            export APP_DIR
            export BASE_PATH="/Yonyou_red"
            export NPM_REGISTRY="https://registry.npmmirror.com"
            bash "$APP_DIR/deploy/build-on-server.sh"
